<html lang="es">
<head>

<title>Finanzas · Neo Vector</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(160deg,#080d1a 0%,#0f172a 50%,#0a1628 100%);min-height:100vh;font-family:'DM Sans',sans-serif;color:#e2e8f0;-webkit-tap-highlight-color:transparent;}
input,select,textarea{outline:none;font-family:inherit;}
input:focus,select:focus{border-color:#6EE7B7!important;}
select option{background:#0f172a;color:#f1f5f9;}
.btn-main{background:#6EE7B7;color:#080d1a;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-main:hover{background:#4ade80;}
.btn-main:active{transform:scale(.97);}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;}
.btn-ghost:hover{border-color:#6EE7B7;color:#6EE7B7;}
.btn-sm-g{background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.2);color:#6EE7B7;border-radius:7px;padding:4px 8px;cursor:pointer;font-size:12px;font-family:inherit;}
.btn-sm-d{background:rgba(252,165,165,.08);border:1px solid rgba(252,165,165,.15);color:#FCA5A5;border-radius:7px;padding:4px 8px;cursor:pointer;font-size:14px;font-family:inherit;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px 16px;}
.card-nv{background:rgba(52,211,153,.04);border:1px solid rgba(52,211,153,.2);border-radius:18px;padding:18px 16px;}
.inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#f1f5f9;padding:9px 12px;font-size:14px;font-family:inherit;width:100%;transition:border .2s;}
.lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;display:block;}
.row-h:hover{background:rgba(255,255,255,.03);border-radius:10px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:9px;}
.tab-btn{cursor:pointer;border:none;font-family:inherit;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;}
.subtab{cursor:pointer;border:none;font-family:inherit;transition:all .15s;background:none;white-space:nowrap;}
.wrap{max-width:540px;margin:0 auto;padding:0 18px;}
.flex{display:flex;}
.col{flex-direction:column;}
.gap-12{gap:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.alert-warn{background:rgba(253,230,138,.1);border:1px solid rgba(253,230,138,.2);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:#FDE68A;}
.alert-danger{background:rgba(252,165,165,.12);border:1px solid rgba(252,165,165,.25);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:#FCA5A5;}
.prog-track{background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;}
.fade-in{animation:fadeUp .25s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Sync indicator */
#sync-bar{position:fixed;top:0;left:0;right:0;z-index:999;padding:8px 18px;font-size:12px;font-weight:600;text-align:center;transition:all .4s;transform:translateY(-100%);}
#sync-bar.show{transform:translateY(0);}
#sync-bar.syncing{background:#1e293b;color:#6EE7B7;border-bottom:1px solid rgba(110,231,183,.2);}
#sync-bar.ok{background:#064e3b;color:#6EE7B7;border-bottom:1px solid rgba(110,231,183,.3);}
#sync-bar.offline{background:#1e293b;color:#FDE68A;border-bottom:1px solid rgba(253,230,138,.2);}
#sync-bar.error{background:#450a0a;color:#FCA5A5;border-bottom:1px solid rgba(252,165,165,.2);}
/* Install banner */
#install-banner{display:none;position:fixed;bottom:80px;left:18px;right:18px;max-width:504px;margin:0 auto;background:#1e293b;border:1px solid rgba(110,231,183,.3);border-radius:16px;padding:14px 16px;z-index:998;align-items:center;gap:12px;}
#install-banner.show{display:flex;}
</style>
</head>
<body>

<!-- Sync bar -->
<div id="sync-bar"></div>

<!-- Install banner -->
<div id="install-banner">
  <span style="font-size:24px">📲</span>
  <div style="flex:1">
    <p style="font-size:13px;font-weight:700;color:#f1f5f9">Instalar app</p>

  <button id="install-btn" class="btn-main" style="padding:8px 14px;font-size:13px">Instalar</button>

</div>

<div id="app"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg7clDkuWX1ey53g-DOy5OEpd0bXHYQwY",
  authDomain: "finanzas-neo-vector.firebaseapp.com",
  projectId: "finanzas-neo-vector",
  storageBucket: "finanzas-neo-vector.firebasestorage.app",
  messagingSenderId: "738952032019",
  appId: "1:738952032019:web:a5788f2d620fc957f4b4e6"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// Enable offline persistence
enableIndexedDbPersistence(db).catch(()=>{});

const DOC_ID = "lucas"; // ID de usuario fijo
const docRef = doc(db, "finanzas", DOC_ID);

const syncBar = document.getElementById("sync-bar");
let syncTimeout;

function showSync(type, msg){
  syncBar.className = `show ${type}`;
  syncBar.textContent = msg;
  clearTimeout(syncTimeout);
  if(type === "ok"){
    syncTimeout = setTimeout(()=>{ syncBar.className=""; }, 3000);
  }
}

// Expose firebase helpers to React app
window.__fb = {
  async save(data){
    try {
      showSync("syncing","☁️ Sincronizando...");
      await setDoc(docRef, { data: JSON.stringify(data), updatedAt: new Date().toISOString() });
      showSync("ok","✓ Sincronizado");
    } catch(e){
      if(!navigator.onLine){
        showSync("offline","📴 Sin internet — guardado localmente");
      } else {
        showSync("error","⚠️ Error al sincronizar");
      }
    }
  },
  async load(){
    try {
      const snap = await getDoc(docRef);
      if(snap.exists()) return JSON.parse(snap.data().data);
      return null;
    } catch(e){ return null; }
  },
  onSnapshot(cb){
    return onSnapshot(docRef, snap => {
      if(snap.exists()) cb(JSON.parse(snap.data().data));
    });
  }
};

window.dispatchEvent(new Event("fb-ready"));

// Online/offline indicator
window.addEventListener("online",  ()=>showSync("ok","✓ Conexión restaurada — sincronizando..."));
window.addEventListener("offline", ()=>showSync("offline","📴 Sin internet — modo offline activo"));
</script>

<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const fmt = n => new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
const todayStr = () => new Date().toISOString().split("T")[0];
const monthKey = (d=new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
const monthLabel = key => { const [y,m]=key.split("-"); return new Date(y,m-1).toLocaleDateString("es-AR",{month:"long",year:"numeric"}); };
const uid = () => Math.random().toString(36).slice(2,9);
const getQ = dateStr => parseInt(dateStr.split("-")[2])<=15?1:2;
const pill = c => ({background:c+"22",color:c,borderRadius:999,padding:"3px 10px",fontSize:11,fontWeight:700,display:"inline-block"});
const mlabel = s => s.charAt(0).toUpperCase()+s.slice(1);

const STORAGE_KEY = "finanzas_nv_pwa";
const DEFAULT = {months:{},daily:[],neoVector:[],installments:[],loans:[],goals:[],dueDates:[]};
const CATS = [
  {id:"trabajo",label:"Comida trabajo",icon:"🥡",color:"#FDE68A"},
  {id:"casa",label:"Comida casa",icon:"🏠",color:"#6EE7B7"},
  {id:"hormigas",label:"Gastos hormiga",icon:"🐜",color:"#FCA5A5"},
];
const GICONS = ["🏖️","🚗","💻","📱","🏠","✈️","🎓","💍","🏋️","🎮","🐶","🎸"];
const GCOLORS = ["#6EE7B7","#93C5FD","#FDE68A","#FCA5A5","#C4B5FD","#F9A8D4"];
const TABS = [{label:"Mes",icon:"📅"},{label:"Diario",icon:"📆"},{label:"Tarjeta",icon:"💳"},{label:"Ahorros",icon:"🎯"},{label:"Más",icon:"⚡"}];

function Donut({slices,size=110,stroke=13}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  const total=slices.reduce((a,s)=>a+s.value,0);
  let acc=0;
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)"}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={stroke}/>
    {slices.filter(s=>s.value>0).map((s,i)=>{
      const pct=s.value/total,dash=pct*circ,offset=circ-acc*circ; acc+=pct;
      return <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={offset} strokeLinecap="butt"/>;
    })}
  </svg>;
}

function BarChart({data,height=100}){
  const max=Math.max(...data.map(d=>d.value),1);
  return <div style={{display:"flex",alignItems:"flex-end",gap:6,height}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <div style={{width:"100%",borderRadius:"6px 6px 0 0",background:d.color||"#6EE7B7",height:`${(d.value/max)*(height-20)}px`,transition:"height .4s",minHeight:3}}/>
      <span style={{fontSize:9,color:"#475569",textAlign:"center"}}>{d.label}</span>
    </div>)}
  </div>;
}

function InstCard({item,onPay,onRemove,onEdit}){
  const rem=item.cuotas-item.pagadas,pct=(item.pagadas/item.cuotas)*100,done=rem===0;
  return <div style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid rgba(255,255,255,.06)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
      <div>
        <p style={{fontSize:14,fontWeight:600,color:done?"#475569":"#f1f5f9",textDecoration:done?"line-through":"none"}}>{item.desc}</p>
        <p style={{fontSize:11,color:"#64748b",marginTop:2}}>Total {fmt(item.total)} · {fmt(item.valorCuota)}/cuota</p>
      </div>
      <div style={{display:"flex",gap:5,flexShrink:0}}>
        {!done&&<button className="btn-sm-g" onClick={()=>onPay(item.id)}>✓</button>}
        {onEdit&&<button className="btn-sm-g" onClick={()=>onEdit(item)}>✏️</button>}
        <button className="btn-sm-d" onClick={()=>onRemove(item.id)}>×</button>
      </div>
    </div>
    <div className="prog-track" style={{height:5,marginBottom:8}}>
      <div style={{height:"100%",borderRadius:999,width:`${pct}%`,background:done?"#334155":"linear-gradient(90deg,#6EE7B7,#93C5FD)",transition:"width .4s"}}/>
    </div>
    <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>
      {Array.from({length:item.cuotas}).map((_,i)=>{
        const paid=i<item.pagadas,cur=i===item.pagadas;
        return <div key={i} title={`Cuota ${i+1}: ${fmt(item.valorCuota)}`} style={{
          width:24,height:24,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:10,fontWeight:700,
          background:paid?"#6EE7B720":cur?"#FDE68A20":"rgba(255,255,255,.04)",
          color:paid?"#6EE7B7":cur?"#FDE68A":"#334155",
          border:cur?"1px solid #FDE68A55":"1px solid transparent"
        }}>{i+1}</div>;
      })}
    </div>
    <div style={{display:"flex",justifyContent:"space-between"}}>
      <span style={{fontSize:11,color:"#64748b"}}>{item.pagadas}/{item.cuotas} pagadas</span>
      {done?<span style={pill("#6EE7B7")}>✓ Pagado</span>:<span style={pill("#FDE68A")}>{rem} restantes · {fmt(rem*item.valorCuota)}</span>}
    </div>
  </div>;
}

function App(){
  const [data,setData]=useState(DEFAULT);
  const [tab,setTab]=useState(0);
  const [subTab,setSubTab]=useState(0);
  const [curMonth,setCurMonth]=useState(monthKey());
  const [alerts,setAlerts]=useState([]);
  const [fbReady,setFbReady]=useState(false);
  const [loading,setLoading]=useState(true);
  const saveTimer=useRef(null);

  // Wait for Firebase
  useEffect(()=>{
    if(window.__fb){ setFbReady(true); return; }
    window.addEventListener("fb-ready",()=>setFbReady(true),{once:true});
  },[]);

  // Load data: Firebase first, fallback to localStorage
  useEffect(()=>{
    if(!fbReady) return;
    (async()=>{
      try {
        const cloudData = await window.__fb.load();
        if(cloudData){ setData(cloudData); localStorage.setItem(STORAGE_KEY,JSON.stringify(cloudData)); }
        else {
          const local = localStorage.getItem(STORAGE_KEY);
          if(local) setData(JSON.parse(local));
        }
      } catch {
        const local = localStorage.getItem(STORAGE_KEY);
        if(local) setData(JSON.parse(local));
      }
      setLoading(false);
    })();
  },[fbReady]);

  // Real-time sync from other devices
  useEffect(()=>{
    if(!fbReady||loading) return;
    const unsub = window.__fb.onSnapshot(cloudData=>{
      setData(cloudData);
      localStorage.setItem(STORAGE_KEY,JSON.stringify(cloudData));
    });
    return ()=>unsub();
  },[fbReady,loading]);

  // Save debounced — 1.5s after last change
  const saveData = useCallback((newData)=>{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(newData));
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{ window.__fb?.save(newData); },1500);
  },[]);

  const update = patch => {
    setData(prev=>{ const next={...prev,...patch}; saveData(next); return next; });
  };

  const getMonth=(key=curMonth)=>data.months[key]||{};
  const setMonth=(patch,key=curMonth)=>update({months:{...data.months,[key]:{...getMonth(key),...patch}}});

  const m=getMonth();
  const salary=(parseFloat(m.salary1)||0)+(parseFloat(m.salary2)||0);
  const fixedTotal=(parseFloat(m.internet)||0)+(parseFloat(m.celular)||0)+(parseFloat(m.tarjetaMin)||0);
  const monthDaily=data.daily.filter(d=>d.date.startsWith(curMonth));
  const dailyTotal=monthDaily.reduce((a,d)=>a+d.amount,0);
  const instMonthly=data.installments.reduce((a,i)=>(i.pagadas<i.cuotas?a+i.valorCuota:a),0);
  const loanMonthly=data.loans.reduce((a,l)=>(l.pagadas<l.cuotas?a+l.valorCuota:a),0);
  const monthNV=(data.neoVector||[]).filter(n=>n.date.startsWith(curMonth));
  const nvQ1=monthNV.filter(n=>getQ(n.date)===1).reduce((a,n)=>a+n.amount,0);
  const nvQ2=monthNV.filter(n=>getQ(n.date)===2).reduce((a,n)=>a+n.amount,0);
  const nvTotal=nvQ1+nvQ2;
  const netQ1=(parseFloat(m.salary1)||0)-nvQ1;
  const netQ2=(parseFloat(m.salary2)||0)-nvQ2;
  const totalSpent=fixedTotal+dailyTotal+instMonthly+loanMonthly+nvTotal;
  const net=salary-totalSpent;
  const healthPct=salary>0?(net/salary)*100:0;
  const healthColor=healthPct>=20?"#6EE7B7":healthPct>=0?"#FDE68A":"#FCA5A5";
  const creditMax=parseFloat(m.creditLimit)||0;
  const creditUsed=data.installments.reduce((a,i)=>a+(i.cuotas-i.pagadas)*i.valorCuota,0);
  const creditPct=creditMax>0?Math.min((creditUsed/creditMax)*100,100):0;

  useEffect(()=>{
    const al=[];
    if(salary>0&&totalSpent/salary>0.8) al.push({type:"warn",msg:"⚠️ Usaste más del 80% del sueldo este mes"});
    if(creditMax>0&&creditPct>30) al.push({type:"warn",msg:`⚠️ Tu tarjeta supera el 30% del límite (${Math.round(creditPct)}%)`});
    if(net<0) al.push({type:"danger",msg:`🔴 Déficit de ${fmt(Math.abs(net))} este mes`});
    setAlerts(al);
  },[salary,totalSpent,creditPct,net]);

  const histMonths=Object.keys(data.months).sort().reverse();

  const [newDaily,setNewDaily]=useState({date:todayStr(),cat:"trabajo",desc:"",amount:""});
  const [newNV,setNewNV]=useState({date:todayStr(),desc:"",amount:""});
  const [newInst,setNewInst]=useState({desc:"",total:"",cuotas:"",pagadas:"0"});
  const [newLoan,setNewLoan]=useState({desc:"",total:"",cuotas:"",pagadas:"0"});
  const [newGoal,setNewGoal]=useState({label:"",target:"",saved:"0",icon:"🏖️",color:"#6EE7B7"});
  const [newDue,setNewDue]=useState({label:"",day:"",color:"#6EE7B7"});
  const [editInstId,setEditInstId]=useState(null);
  const [showExport,setShowExport]=useState(false);
  const [copied,setCopied]=useState(false);
  const importRef=useRef();

  const addDaily=()=>{
    if(!newDaily.amount||!newDaily.desc) return;
    update({daily:[{id:uid(),...newDaily,amount:parseFloat(newDaily.amount)},...data.daily]});
    setNewDaily({date:todayStr(),cat:"trabajo",desc:"",amount:""});
  };
  const addNV=()=>{
    if(!newNV.amount||!newNV.desc) return;
    update({neoVector:[{id:uid(),...newNV,amount:parseFloat(newNV.amount)},...(data.neoVector||[])]});
    setNewNV({date:todayStr(),desc:"",amount:""});
  };
  const removeNV=id=>update({neoVector:(data.neoVector||[]).filter(n=>n.id!==id)});

  const addInstallment=()=>{
    const {desc,total,cuotas,pagadas}=newInst;
    if(!desc||!total||!cuotas) return;
    const c=parseInt(cuotas),p=parseInt(pagadas)||0,vc=parseFloat(total)/c;
    if(editInstId){
      update({installments:data.installments.map(i=>i.id===editInstId?{...i,desc,total:parseFloat(total),cuotas:c,pagadas:p,valorCuota:vc}:i)});
      setEditInstId(null);
    } else {
      update({installments:[{id:uid(),desc,total:parseFloat(total),cuotas:c,pagadas:p,valorCuota:vc,createdAt:todayStr()},...data.installments]});
    }
    setNewInst({desc:"",total:"",cuotas:"",pagadas:"0"});
  };
  const payInst=id=>update({installments:data.installments.map(i=>i.id===id&&i.pagadas<i.cuotas?{...i,pagadas:i.pagadas+1}:i)});
  const removeInst=id=>update({installments:data.installments.filter(i=>i.id!==id)});

  const addLoan=()=>{
    const {desc,total,cuotas,pagadas}=newLoan;
    if(!desc||!total||!cuotas) return;
    const c=parseInt(cuotas),p=parseInt(pagadas)||0;
    update({loans:[{id:uid(),desc,total:parseFloat(total),cuotas:c,pagadas:p,valorCuota:parseFloat(total)/c,createdAt:todayStr()},...data.loans]});
    setNewLoan({desc:"",total:"",cuotas:"",pagadas:"0"});
  };
  const payLoan=id=>update({loans:data.loans.map(l=>l.id===id&&l.pagadas<l.cuotas?{...l,pagadas:l.pagadas+1}:l)});
  const removeLoan=id=>update({loans:data.loans.filter(l=>l.id!==id)});

  const addGoal=()=>{
    if(!newGoal.label||!newGoal.target) return;
    update({goals:[{id:uid(),...newGoal,target:parseFloat(newGoal.target),saved:parseFloat(newGoal.saved)||0},...data.goals]});
    setNewGoal({label:"",target:"",saved:"0",icon:"🏖️",color:"#6EE7B7"});
  };
  const addToGoal=(id,amount)=>update({goals:data.goals.map(g=>g.id===id?{...g,saved:Math.min(g.saved+amount,g.target)}:g)});
  const removeGoal=id=>update({goals:data.goals.filter(g=>g.id!==id)});

  const addDue=()=>{
    if(!newDue.label||!newDue.day) return;
    update({dueDates:[{id:uid(),...newDue,day:parseInt(newDue.day)},...data.dueDates]});
    setNewDue({label:"",day:"",color:"#6EE7B7"});
  };
  const removeDue=id=>update({dueDates:data.dueDates.filter(d=>d.id!==id)});

  const today2=new Date();
  const dueSoon=data.dueDates.map(d=>{
    let next=new Date(today2.getFullYear(),today2.getMonth(),d.day);
    if(next<today2) next=new Date(today2.getFullYear(),today2.getMonth()+1,d.day);
    const diff=Math.ceil((next-today2)/86400000);
    return {...d,diff,nextDate:next.toLocaleDateString("es-AR",{day:"numeric",month:"short"})};
  }).sort((a,b)=>a.diff-b.diff);

  const donutSlices=[
    {label:"Fijos",value:fixedTotal,color:"#93C5FD"},
    {label:"Diario",value:dailyTotal,color:"#FDE68A"},
    {label:"Tarjeta",value:instMonthly,color:"#FCA5A5"},
    {label:"Préstamos",value:loanMonthly,color:"#C4B5FD"},
    {label:"Neo Vector",value:nvTotal,color:"#34d399"},
  ].filter(s=>s.value>0);

  const barData=histMonths.slice(0,6).reverse().map(mk=>({
    label:monthLabel(mk).slice(0,3),
    value:(data.months[mk]?.internet||0)+(data.months[mk]?.celular||0)+(data.months[mk]?.tarjetaMin||0),
    color:mk===curMonth?"#6EE7B7":"#334155"
  }));

  const exportJson=JSON.stringify(data,null,2);
  const downloadJson=()=>{
    const blob=new Blob([exportJson],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`finanzas_${curMonth}.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const copyExport=()=>{ navigator.clipboard.writeText(exportJson).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}); };
  const importData=e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); setData(d); saveData(d); }catch{ alert("Archivo inválido"); } };
    r.readAsText(file);
  };

  if(loading) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16}}>
    <div style={{width:48,height:48,border:"3px solid rgba(110,231,183,.2)",borderTop:"3px solid #6EE7B7",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    <p style={{color:"#475569",fontSize:13}}>Cargando tus finanzas...</p>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;

  return <div style={{minHeight:"100vh"}}>
    {alerts.length>0&&<div className="wrap" style={{paddingTop:14}}>
      {alerts.map((a,i)=><div key={i} className={a.type==="danger"?"alert-danger":"alert-warn"}>{a.msg}</div>)}
    </div>}

    {/* Header */}
    <div className="wrap" style={{paddingTop:22}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <p style={{fontSize:10,color:"#475569",letterSpacing:3,textTransform:"uppercase"}}>Panel financiero</p>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#f8fafc",marginTop:2}}>{mlabel(monthLabel(curMonth))}</h1>
        </div>
        <select value={curMonth} onChange={e=>setCurMonth(e.target.value)}
          style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:"#94a3b8",padding:"7px 10px",fontSize:12,cursor:"pointer"}}>
          {[0,1,2,3,4,5].map(offset=>{ const d=new Date(); d.setMonth(d.getMonth()-offset); const k=monthKey(d); return <option key={k} value={k}>{monthLabel(k)}</option>; })}
        </select>
      </div>
      {salary>0&&<div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
        <span style={pill("#6EE7B7")}>💰 {fmt(salary)}</span>
        <span style={pill("#FCA5A5")}>📤 {fmt(totalSpent)}</span>
        <span style={pill(healthColor)}>💵 {fmt(net)}</span>
      </div>}
    </div>

    {/* Tabs */}
    <div className="wrap" style={{marginTop:16}}>
      <div style={{display:"flex",background:"rgba(255,255,255,.04)",borderRadius:16,padding:5,border:"1px solid rgba(255,255,255,.07)",gap:4}}>
        {TABS.map((t,i)=><button key={i} className="tab-btn" onClick={()=>setTab(i)} style={{
          flex:1,padding:"8px 4px",borderRadius:11,
          background:tab===i?"#6EE7B7":"transparent",
          color:tab===i?"#080d1a":"#64748b",
          fontWeight:tab===i?700:400,fontSize:11
        }}><span style={{fontSize:16}}>{t.icon}</span>{t.label}</button>)}
      </div>
    </div>

    <div className="wrap fade-in" style={{marginTop:14,marginBottom:80,paddingBottom:20}} key={tab}>

      {/* ══ TAB 0: MES ══ */}
      {tab===0&&<div className="flex col gap-12">
        <div className="card">
          <p className="lbl" style={{marginBottom:12}}>Sueldos del mes</p>
          <div className="grid2" style={{marginBottom:12}}>
            {[["salary1","1° quincena"],["salary2","2° quincena"]].map(([k,label])=><div key={k}>
              <span className="lbl">{label}</span>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{color:"#6EE7B7",fontWeight:700}}>$</span>
                <input className="inp" type="number" placeholder="0" value={m[k]||""} onChange={e=>setMonth({[k]:e.target.value})}/>
              </div>
            </div>)}
          </div>
          {salary>0&&<div style={{background:"rgba(110,231,183,.07)",borderRadius:10,padding:"9px 14px",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:"#64748b"}}>Total mensual</span>
            <span style={{fontSize:16,fontWeight:700,color:"#6EE7B7"}}>{fmt(salary)}</span>
          </div>}
        </div>

        {/* Neo Vector */}
        <div className="card-nv">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(52,211,153,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🚀</div>
            <div><p style={{fontSize:13,fontWeight:700,color:"#34d399"}}>Neo Vector</p><p style={{fontSize:10,color:"#64748b"}}>Gastos de tu emprendimiento</p></div>
            <span style={{marginLeft:"auto",...pill("#34d399")}}>{fmt(nvTotal)}</span>
          </div>
          <div className="grid2" style={{marginBottom:14}}>
            {[{q:1,label:"1° quincena (1–15)",nvAmt:nvQ1,net:netQ1},{q:2,label:"2° quincena (16–31)",nvAmt:nvQ2,net:netQ2}].map(({q,label,nvAmt,net:n})=>(
              <div key={q} style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:"12px 10px",border:"1px solid rgba(255,255,255,.07)"}}>
                <p style={{fontSize:10,color:"#64748b",marginBottom:6}}>{label}</p>
                <p style={{fontSize:13,color:"#FCA5A5",fontWeight:600}}>− {fmt(nvAmt)}</p>
                <div style={{borderTop:"1px solid rgba(255,255,255,.07)",marginTop:6,paddingTop:6,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:10,color:"#64748b"}}>libre</span>
                  <span style={{fontSize:13,fontWeight:700,color:n>=0?"#6EE7B7":"#FCA5A5"}}>{fmt(n)}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto auto",gap:8,alignItems:"flex-end",marginBottom:monthNV.length?14:0}}>
            <div><span className="lbl">Fecha</span><input className="inp" type="date" value={newNV.date} onChange={e=>setNewNV({...newNV,date:e.target.value})} style={{width:130}}/></div>
            <div><span className="lbl">Descripción</span><input className="inp" placeholder="hosting, insumo..." value={newNV.desc} onChange={e=>setNewNV({...newNV,desc:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addNV()}/></div>
            <div><span className="lbl">Monto $</span><input className="inp" type="number" placeholder="0" value={newNV.amount} onChange={e=>setNewNV({...newNV,amount:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addNV()} style={{width:90}}/></div>
            <button className="btn-main" onClick={addNV} style={{marginBottom:1,padding:"9px 14px",background:"#34d399"}}>+</button>
          </div>
          {monthNV.length===0&&<p style={{fontSize:12,color:"#475569",textAlign:"center",padding:"8px 0"}}>Sin gastos de Neo Vector este mes</p>}
          {monthNV.map(n=>{const q=getQ(n.date); return <div key={n.id} className="row-h" style={{display:"flex",alignItems:"center",gap:10,padding:"7px 6px"}}>
            <div style={{width:22,height:22,borderRadius:6,background:q===1?"rgba(147,197,253,.15)":"rgba(196,181,253,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:q===1?"#93C5FD":"#C4B5FD",flexShrink:0}}>Q{q}</div>
            <div style={{flex:1}}><p style={{fontSize:13,color:"#cbd5e1"}}>{n.desc}</p><p style={{fontSize:10,color:"#475569"}}>{n.date}</p></div>
            <p style={{fontSize:13,fontWeight:700,color:"#34d399"}}>{fmt(n.amount)}</p>
            <button className="btn-sm-d" onClick={()=>removeNV(n.id)}>×</button>
          </div>;})}
        </div>

        {/* Gastos fijos */}
        <div className="card">
          <p className="lbl" style={{marginBottom:12}}>Gastos fijos del mes</p>
          {[{k:"internet",icon:"📶",label:"Internet",color:"#93C5FD"},{k:"celular",icon:"📱",label:"Abono celular",color:"#C4B5FD"},{k:"tarjetaMin",icon:"💳",label:"Pago mínimo tarjeta",color:"#FCA5A5"}].map(f=>(
            <div key={f.k} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:34,height:34,borderRadius:9,background:f.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{f.icon}</div>
              <div style={{flex:1}}><span className="lbl">{f.label}</span><input className="inp" type="number" placeholder="0" value={m[f.k]||""} onChange={e=>setMonth({[f.k]:e.target.value})}/></div>
              <span style={{fontSize:14,fontWeight:700,color:f.color,minWidth:72,textAlign:"right"}}>{fmt(m[f.k])}</span>
            </div>
          ))}
          <div style={{borderTop:"1px solid rgba(255,255,255,.07)",paddingTop:12,marginTop:4}}>
            <span className="lbl">Límite de tarjeta</span>
            <input className="inp" type="number" placeholder="0" value={m.creditLimit||""} onChange={e=>setMonth({creditLimit:e.target.value})}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:12,paddingTop:10,borderTop:"1px solid rgba(255,255,255,.06)"}}>
            <span style={{fontSize:13,color:"#64748b"}}>Total fijos</span>
            <span style={{fontSize:15,fontWeight:700,color:"#FCA5A5"}}>{fmt(fixedTotal)}</span>
          </div>
        </div>

        {/* Donut */}
        {salary>0&&<div className="card">
          <p className="lbl" style={{marginBottom:14}}>Distribución del mes</p>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{position:"relative",flexShrink:0}}>
              <Donut slices={donutSlices.length?donutSlices:[{value:1,color:"#1e293b"}]}/>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <p style={{fontSize:11,color:"#475569"}}>gastado</p>
                <p style={{fontSize:14,fontWeight:700,color:healthColor}}>{Math.round((totalSpent/salary)*100)}%</p>
              </div>
            </div>
            <div style={{flex:1}}>
              {[{label:"Fijos",value:fixedTotal,color:"#93C5FD"},{label:"Diario",value:dailyTotal,color:"#FDE68A"},{label:"Tarjeta",value:instMonthly,color:"#FCA5A5"},{label:"Préstamos",value:loanMonthly,color:"#C4B5FD"},{label:"Neo Vector",value:nvTotal,color:"#34d399"}].map((s,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:8,height:8,borderRadius:"50%",background:s.color}}/><span style={{fontSize:12,color:"#64748b"}}>{s.label}</span></div>
                  <span style={{fontSize:12,fontWeight:600,color:s.color}}>{fmt(s.value)}</span>
                </div>
              ))}
              <div style={{borderTop:"1px solid rgba(255,255,255,.07)",paddingTop:8,marginTop:6,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:12,color:"#64748b"}}>Libre</span>
                <span style={{fontSize:14,fontWeight:800,color:healthColor}}>{fmt(net)}</span>
              </div>
            </div>
          </div>
          <div className="prog-track" style={{height:8,marginTop:14}}>
            <div style={{height:"100%",borderRadius:999,width:`${Math.min((totalSpent/salary)*100,100)}%`,background:`linear-gradient(90deg,#6EE7B7,${healthColor})`,transition:"width .5s"}}/>
          </div>
          <p style={{fontSize:12,color:healthColor,textAlign:"center",marginTop:6,fontWeight:600}}>
            {healthPct>=20?"🟢 Saludable":healthPct>=0?"🟡 Ajustado":"🔴 Déficit"} · {fmt(Math.abs(net))} {net>=0?"libre":"de déficit"}
          </p>
        </div>}
      </div>}

      {/* ══ TAB 1: DIARIO ══ */}
      {tab===1&&<div className="flex col gap-12">
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {CATS.map(c=>{ const total=monthDaily.filter(d=>d.cat===c.id).reduce((a,d)=>a+d.amount,0);
            return <div key={c.id} className="card" style={{textAlign:"center",padding:"14px 8px"}}>
              <div style={{fontSize:22,marginBottom:5}}>{c.icon}</div>
              <p style={{fontSize:10,color:"#64748b",marginBottom:3}}>{c.label.split(" ")[0]}</p>
              <p style={{fontSize:14,fontWeight:700,color:c.color}}>{fmt(total)}</p>
            </div>;})}
        </div>
        <div className="card">
          <p className="lbl" style={{marginBottom:10}}>Nuevo gasto</p>
          <div className="grid2" style={{marginBottom:10}}>
            <div><span className="lbl">Fecha</span><input className="inp" type="date" value={newDaily.date} onChange={e=>setNewDaily({...newDaily,date:e.target.value})}/></div>
            <div><span className="lbl">Categoría</span><select className="inp" value={newDaily.cat} onChange={e=>setNewDaily({...newDaily,cat:e.target.value})}>
              {CATS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,alignItems:"flex-end"}}>
            <div><span className="lbl">Descripción</span><input className="inp" placeholder="café, almuerzo..." value={newDaily.desc} onChange={e=>setNewDaily({...newDaily,desc:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addDaily()}/></div>
            <div><span className="lbl">Monto $</span><input className="inp" type="number" placeholder="0" value={newDaily.amount} onChange={e=>setNewDaily({...newDaily,amount:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addDaily()} style={{width:88}}/></div>
            <button className="btn-main" onClick={addDaily} style={{marginBottom:1,padding:"9px 14px"}}>+</button>
          </div>
        </div>
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p className="lbl">Este mes ({monthDaily.length})</p>
            <span style={pill("#FDE68A")}>{fmt(dailyTotal)}</span>
          </div>
          {monthDaily.length===0&&<p style={{fontSize:13,color:"#475569",textAlign:"center",padding:"14px 0"}}>Sin gastos este mes</p>}
          {monthDaily.map(d=>{ const cat=CATS.find(c=>c.id===d.cat);
            return <div key={d.id} className="row-h" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 6px"}}>
              <span style={{fontSize:17}}>{cat?.icon}</span>
              <div style={{flex:1}}><p style={{fontSize:13,color:"#cbd5e1"}}>{d.desc}</p><p style={{fontSize:10,color:"#475569"}}>{d.date} · {cat?.label}</p></div>
              <p style={{fontSize:13,fontWeight:700,color:cat?.color}}>{fmt(d.amount)}</p>
              <button className="btn-sm-d" onClick={()=>update({daily:data.daily.filter(x=>x.id!==d.id)})}>×</button>
            </div>;})}
        </div>
      </div>}

      {/* ══ TAB 2: TARJETA ══ */}
      {tab===2&&<div className="flex col gap-12">
        <div className="card" style={{background:"linear-gradient(135deg,rgba(20,50,90,.95),rgba(10,22,40,.98))"}}>
          <p style={{fontSize:10,color:"#475569",letterSpacing:3,textTransform:"uppercase",marginBottom:16}}>Tarjeta de crédito</p>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:16}}>
            <div><span className="lbl">Límite</span><p style={{fontSize:20,fontWeight:700,color:"#f1f5f9"}}>{fmt(creditMax)}</p></div>
            <div style={{textAlign:"right"}}>
              <span className="lbl">Saldo comprometido</span>
              <p style={{fontSize:20,fontWeight:700,color:creditPct>75?"#FCA5A5":"#FDE68A"}}>{fmt(creditUsed)}</p>
              <p style={{fontSize:11,color:"#475569"}}>libre: {fmt(Math.max(0,creditMax-creditUsed))}</p>
            </div>
          </div>
          <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:10,color:"#475569"}}>Utilización</span>
            <span style={{fontSize:11,fontWeight:700,color:creditPct>75?"#FCA5A5":"#6EE7B7"}}>{Math.round(creditPct)}%</span>
          </div>
          <div className="prog-track" style={{height:7}}>
            <div style={{height:"100%",borderRadius:999,width:`${creditPct}%`,background:`linear-gradient(90deg,#6EE7B7,${creditPct>75?"#FCA5A5":"#6EE7B7"})`,transition:"width .5s"}}/>
          </div></div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
            <span style={{fontSize:11,color:"#64748b"}}>Cuota total este mes</span>
            <span style={{fontSize:14,fontWeight:700,color:"#FCA5A5"}}>{fmt(instMonthly)}</span>
          </div>
        </div>
        <div className="card">
          <p className="lbl" style={{marginBottom:10}}>{editInstId?"✏️ Editar":"Nueva compra en cuotas"}</p>
          <div className="flex col" style={{gap:10}}>
            <div><span className="lbl">Descripción</span><input className="inp" placeholder="Notebook, zapatillas..." value={newInst.desc} onChange={e=>setNewInst({...newInst,desc:e.target.value})}/></div>
            <div className="grid3">
              <div><span className="lbl">Total $</span><input className="inp" type="number" placeholder="0" value={newInst.total} onChange={e=>setNewInst({...newInst,total:e.target.value})}/></div>
              <div><span className="lbl">Cuotas</span><input className="inp" type="number" placeholder="12" value={newInst.cuotas} onChange={e=>setNewInst({...newInst,cuotas:e.target.value})}/></div>
              <div><span className="lbl">Pagadas</span><input className="inp" type="number" placeholder="0" value={newInst.pagadas} onChange={e=>setNewInst({...newInst,pagadas:e.target.value})}/></div>
            </div>
            {newInst.total&&newInst.cuotas&&<div style={{background:"rgba(110,231,183,.07)",borderRadius:10,padding:"9px 12px"}}>
              <p style={{fontSize:12,color:"#6EE7B7"}}>Cuota: <strong>{fmt(parseFloat(newInst.total)/parseInt(newInst.cuotas))}</strong> · Restantes: <strong>{parseInt(newInst.cuotas)-(parseInt(newInst.pagadas)||0)}</strong></p>
            </div>}
            <div style={{display:"flex",gap:8}}>
              <button className="btn-main" onClick={addInstallment} style={{flex:1}}>{editInstId?"Actualizar":"Agregar"}</button>
              {editInstId&&<button className="btn-ghost" onClick={()=>{setEditInstId(null);setNewInst({desc:"",total:"",cuotas:"",pagadas:"0"});}}>Cancelar</button>}
            </div>
          </div>
        </div>
        {data.installments.length>0&&<div className="card">
          <p className="lbl" style={{marginBottom:14}}>Mis cuotas</p>
          {data.installments.map(inst=><InstCard key={inst.id} item={inst} onPay={payInst} onRemove={removeInst}
            onEdit={item=>{setNewInst({desc:item.desc,total:item.total,cuotas:item.cuotas,pagadas:item.pagadas});setEditInstId(item.id);}}/>)}
        </div>}
      </div>}

      {/* ══ TAB 3: AHORROS ══ */}
      {tab===3&&<div className="flex col gap-12">
        <div className="card">
          <p className="lbl" style={{marginBottom:10}}>Nueva meta</p>
          <div className="flex col" style={{gap:10}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10}}>
              <div><span className="lbl">Nombre</span><input className="inp" placeholder="Vacaciones, auto..." value={newGoal.label} onChange={e=>setNewGoal({...newGoal,label:e.target.value})}/></div>
              <div><span className="lbl">Ícono</span><select className="inp" value={newGoal.icon} onChange={e=>setNewGoal({...newGoal,icon:e.target.value})} style={{width:60}}>{GICONS.map(i=><option key={i} value={i}>{i}</option>)}</select></div>
            </div>
            <div className="grid2">
              <div><span className="lbl">Objetivo $</span><input className="inp" type="number" placeholder="0" value={newGoal.target} onChange={e=>setNewGoal({...newGoal,target:e.target.value})}/></div>
              <div><span className="lbl">Ya tenés $</span><input className="inp" type="number" placeholder="0" value={newGoal.saved} onChange={e=>setNewGoal({...newGoal,saved:e.target.value})}/></div>
            </div>
            <div><span className="lbl">Color</span><div style={{display:"flex",gap:8,marginTop:4}}>{GCOLORS.map(c=><div key={c} onClick={()=>setNewGoal({...newGoal,color:c})} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:newGoal.color===c?"3px solid white":"3px solid transparent"}}/>)}</div></div>
            <button className="btn-main" onClick={addGoal}>Crear meta</button>
          </div>
        </div>
        {data.goals.length===0&&<div className="card" style={{textAlign:"center",padding:"28px"}}><p style={{fontSize:32,marginBottom:8}}>🎯</p><p style={{color:"#475569",fontSize:13}}>Creá tu primera meta</p></div>}
        {data.goals.map(g=>{ const pct=Math.min((g.saved/g.target)*100,100),done=g.saved>=g.target,ml=net>0?Math.ceil((g.target-g.saved)/(net*0.1)):"∞";
          return <div key={g.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{width:42,height:42,borderRadius:12,background:g.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{g.icon}</div>
                <div><p style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{g.label}</p><p style={{fontSize:12,color:"#64748b"}}>{fmt(g.saved)} de {fmt(g.target)}</p></div>
              </div>
              <button className="btn-sm-d" onClick={()=>removeGoal(g.id)}>×</button>
            </div>
            <div className="prog-track" style={{height:10,marginBottom:8}}><div style={{height:"100%",borderRadius:999,width:`${pct}%`,background:done?"#6EE7B7":`linear-gradient(90deg,${g.color},${g.color}99)`,transition:"width .5s"}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:12,color:"#64748b"}}>{Math.round(pct)}%</span>
              {done?<span style={pill("#6EE7B7")}>✓ Meta alcanzada</span>:<span style={pill(g.color)}>~{ml} meses más</span>}
            </div>
            {!done&&<div style={{display:"flex",gap:8}}>{[500,1000,5000].map(amt=><button key={amt} className="btn-ghost" onClick={()=>addToGoal(g.id,amt)} style={{flex:1,fontSize:11}}>+{fmt(amt)}</button>)}</div>}
          </div>;})}
      </div>}

      {/* ══ TAB 4: MÁS ══ */}
      {tab===4&&<div className="flex col gap-12">
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
          {["📅 Vencimientos","💸 Préstamos","📈 Historial","📤 Exportar"].map((s,i)=><button key={i} className="subtab" onClick={()=>setSubTab(i)} style={{
            padding:"7px 14px",borderRadius:20,fontSize:12,fontFamily:"inherit",cursor:"pointer",
            background:subTab===i?"#6EE7B7":"rgba(255,255,255,.05)",color:subTab===i?"#080d1a":"#64748b",
            border:subTab===i?"none":"1px solid rgba(255,255,255,.08)",fontWeight:subTab===i?700:400
          }}>{s}</button>)}
        </div>

        {subTab===0&&<div className="flex col gap-12">
          <div className="card">
            <p className="lbl" style={{marginBottom:10}}>Nuevo vencimiento</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,marginBottom:10}}>
              <div><span className="lbl">Descripción</span><input className="inp" placeholder="Internet, celular..." value={newDue.label} onChange={e=>setNewDue({...newDue,label:e.target.value})}/></div>
              <div><span className="lbl">Día</span><input className="inp" type="number" min="1" max="31" placeholder="10" value={newDue.day} onChange={e=>setNewDue({...newDue,day:e.target.value})} style={{width:64}}/></div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>{GCOLORS.map(c=><div key={c} onClick={()=>setNewDue({...newDue,color:c})} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",border:newDue.color===c?"3px solid white":"3px solid transparent"}}/>)}</div>
            <button className="btn-main" onClick={addDue} style={{width:"100%"}}>Agregar</button>
          </div>
          {dueSoon.length===0&&<div className="card" style={{textAlign:"center",padding:"24px"}}><p style={{fontSize:28,marginBottom:6}}>📅</p><p style={{color:"#475569",fontSize:13}}>Sin vencimientos</p></div>}
          {dueSoon.map(d=><div key={d.id} className="card" style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:46,height:46,borderRadius:12,background:d.color+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:14,fontWeight:800,color:d.color}}>{d.day}</span></div>
            <div style={{flex:1}}><p style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>{d.label}</p><p style={{fontSize:11,color:"#64748b"}}>vence el {d.nextDate}</p></div>
            <span style={pill(d.diff<=3?"#FCA5A5":d.diff<=7?"#FDE68A":d.color)}>{d.diff===0?"¡Hoy!":d.diff===1?"Mañana":`${d.diff} días`}</span>
            <button className="btn-sm-d" onClick={()=>removeDue(d.id)}>×</button>
          </div>)}
        </div>}

        {subTab===1&&<div className="flex col gap-12">
          <div className="card">
            <p className="lbl" style={{marginBottom:10}}>Nuevo préstamo</p>
            <div className="flex col" style={{gap:10}}>
              <div><span className="lbl">Descripción</span><input className="inp" placeholder="Préstamo banco..." value={newLoan.desc} onChange={e=>setNewLoan({...newLoan,desc:e.target.value})}/></div>
              <div className="grid3">
                <div><span className="lbl">Total $</span><input className="inp" type="number" placeholder="0" value={newLoan.total} onChange={e=>setNewLoan({...newLoan,total:e.target.value})}/></div>
                <div><span className="lbl">Cuotas</span><input className="inp" type="number" placeholder="12" value={newLoan.cuotas} onChange={e=>setNewLoan({...newLoan,cuotas:e.target.value})}/></div>
                <div><span className="lbl">Pagadas</span><input className="inp" type="number" placeholder="0" value={newLoan.pagadas} onChange={e=>setNewLoan({...newLoan,pagadas:e.target.value})}/></div>
              </div>
              <button className="btn-main" onClick={addLoan}>Agregar préstamo</button>
            </div>
          </div>
          {data.loans.length===0&&<div className="card" style={{textAlign:"center",padding:"24px"}}><p style={{fontSize:28,marginBottom:6}}>💸</p><p style={{color:"#475569",fontSize:13}}>Sin préstamos</p></div>}
          {data.loans.length>0&&<div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <p className="lbl">Activos</p><span style={pill("#C4B5FD")}>{fmt(loanMonthly)}/mes</span>
            </div>
            {data.loans.map(l=><InstCard key={l.id} item={l} onPay={payLoan} onRemove={removeLoan}/>)}
          </div>}
        </div>}

        {subTab===2&&<div className="flex col gap-12">
          {barData.length>1&&<div className="card"><p className="lbl" style={{marginBottom:14}}>Gastos fijos por mes</p><BarChart data={barData}/></div>}
          {histMonths.length===0&&<div className="card" style={{textAlign:"center",padding:"24px"}}><p style={{fontSize:28,marginBottom:6}}>📈</p><p style={{color:"#475569",fontSize:13}}>Sin historial aún</p></div>}
          {histMonths.map(mk=>{ const hm=data.months[mk];
            const hS=(parseFloat(hm.salary1)||0)+(parseFloat(hm.salary2)||0);
            const hF=(parseFloat(hm.internet)||0)+(parseFloat(hm.celular)||0)+(parseFloat(hm.tarjetaMin)||0);
            const hD=data.daily.filter(d=>d.date.startsWith(mk)).reduce((a,d)=>a+d.amount,0);
            const hN=(data.neoVector||[]).filter(n=>n.date.startsWith(mk)).reduce((a,n)=>a+n.amount,0);
            const hNet=hS-hF-hD-hN;
            return <div key={mk} className="card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><p style={{fontSize:14,fontWeight:700,color:mk===curMonth?"#6EE7B7":"#f1f5f9"}}>{mlabel(monthLabel(mk))}{mk===curMonth?" ✦":""}</p><p style={{fontSize:11,color:"#64748b",marginTop:2}}>Fijos {fmt(hF)} · Diario {fmt(hD)} · NV {fmt(hN)}</p></div>
                <div style={{textAlign:"right"}}><p style={{fontSize:14,fontWeight:700,color:"#6EE7B7"}}>{fmt(hS)}</p><span style={pill(hNet>=0?"#6EE7B7":"#FCA5A5")}>{hNet>=0?"+":""}{fmt(hNet)}</span></div>
              </div>
            </div>;})}
        </div>}

        {subTab===3&&<div className="flex col gap-12">
          <div className="card">
            <p className="lbl" style={{marginBottom:6}}>Exportar / Importar</p>
            <p style={{fontSize:13,color:"#64748b",marginBottom:14,lineHeight:1.6}}>Tus datos se sincronizan automáticamente con la nube. Podés además descargar un respaldo local.</p>
            <button className="btn-main" onClick={downloadJson} style={{width:"100%",marginBottom:10}}>⬇️ Descargar respaldo .json</button>
            <button className="btn-ghost" onClick={()=>setShowExport(v=>!v)} style={{width:"100%",padding:"10px",marginBottom:10}}>{showExport?"🔼 Ocultar":"📋 Ver JSON"}</button>
            {showExport&&<div>
              <button onClick={copyExport} style={{width:"100%",marginBottom:10,padding:"11px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:14,background:copied?"#34d399":"#6EE7B7",color:"#080d1a",transition:"background .3s"}}>{copied?"✓ ¡Copiado!":"📋 Copiar"}</button>
              <textarea readOnly value={exportJson} onClick={e=>e.target.select()} style={{width:"100%",height:160,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:"#64748b",fontSize:11,fontFamily:"monospace",padding:12,resize:"none",outline:"none"}}/>
            </div>}
            <input ref={importRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            <button className="btn-ghost" onClick={()=>importRef.current.click()} style={{width:"100%",padding:"11px"}}>⬆️ Importar .json</button>
          </div>
          <div className="card">
            <p className="lbl" style={{marginBottom:10}}>Resumen para compartir</p>
            <pre style={{fontSize:12,color:"#94a3b8",lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:"monospace",background:"rgba(255,255,255,.03)",padding:12,borderRadius:10}}>
{`📊 ${mlabel(monthLabel(curMonth))}
💰 Ingresos: ${fmt(salary)}
📤 Gastos fijos: ${fmt(fixedTotal)}
🐜 Gastos diarios: ${fmt(dailyTotal)}
🚀 Neo Vector: ${fmt(nvTotal)}
💳 Cuotas: ${fmt(instMonthly)}
💸 Préstamos: ${fmt(loanMonthly)}
─────────────────────
✅ Libre: ${fmt(net)}`}
            </pre>
            <button className="btn-ghost" onClick={()=>navigator.clipboard.writeText(`📊 ${mlabel(monthLabel(curMonth))}\n💰 Ingresos: ${fmt(salary)}\n📤 Fijos: ${fmt(fixedTotal)}\n🐜 Diario: ${fmt(dailyTotal)}\n🚀 Neo Vector: ${fmt(nvTotal)}\n💳 Cuotas: ${fmt(instMonthly)}\n💸 Préstamos: ${fmt(loanMonthly)}\n─────────────────\n✅ Libre: ${fmt(net)}`)} style={{width:"100%",marginTop:10,padding:"10px"}}>📋 Copiar resumen</button>
          </div>
        </div>}
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>

<!-- PWA Install prompt -->
<script>
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").classList.add("show");
});
document.getElementById("install-btn").addEventListener("click", async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("install-banner").classList.remove("show");
});
window.addEventListener("appinstalled", () => {
  document.getElementById("install-banner").classList.remove("show");
});
</script>

</body>
</html>
